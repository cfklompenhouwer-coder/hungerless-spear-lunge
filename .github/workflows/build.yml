name: Build Hungerless Spear Lunge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode source files
        run: |
          echo "H4sIAAAAAAAAA+1d65aiuBL+..." | base64 -d | tar xz
        env:
          BASE64_ARCHIVE: "H4sIAAAAAAAAA+1d65aiuBL+..."
          
      - name: Build
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hungerless-Spear-Lunge
          path: build/libs/*.jar

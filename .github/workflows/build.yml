name: Build Mod
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # adds a "Run workflow" button in case you want to trigger it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: ./gradlew build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hungerless-Spear-Lunge
          path: build/libs/*.jar

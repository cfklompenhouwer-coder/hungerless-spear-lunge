name: Build Hungerless Spear Lunge
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write all mod source files
        run: |
          mkdir -p src/main/java/net/hungerless/spearlunge/mixin
          mkdir -p src/main/resources
          mkdir -p gradle/wrapper

          cat << 'EOF' > build.gradle
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
              id 'maven-publish'
          }

          version = project.mod_version
          group = project.maven_group

          base {
              archivesName = project.archives_base_name
          }

          repositories {
              mavenCentral()
          }

          dependencies {
              modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
              modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
              mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
          }

          processResources {
              inputs.property "version", project.version
              filteringCharset "UTF-8"

              filesMatching("fabric.mod.json") {
                  expand "version": project.version
              }
          }

          def targetJavaVersion = 17
          tasks.withType(JavaCompile).configureEach {
              it.options.encoding = "UTF-8"
              it.options.release = targetJavaVersion
          }

          java {
              def javaVersion = JavaVersion.toVersion(targetJavaVersion)
              if (JavaVersion.current() < javaVersion) {
                  toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
              }
              archivesBaseName = project.archives_base_name
          }

          jar {
              from("LICENSE") {
                  rename { "${it}_${project.archivesBaseName}" }
              }
          }
          EOF

          cat << 'EOF' > gradle.properties
          minecraft_version=1.21.1
          loader_version=0.16.5
          fabric_version=0.100.4+1.21.1
          mod_version=1.0.0
          maven_group=net.hungerless
          archives_base_name=hungerless_spear_lunge
          yarn_mappings=1.21.1+build.24
          EOF

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  maven { url 'https://maven.fabricmc.net/' }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          EOF

          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.8-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat << 'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "hungerless_spear_lunge",
            "version": "${version}",
            "name": "Hungerless Spear Lunge",
            "description": "Riptide without hunger penalty",
            "authors": ["YourName"],
            "contact": {},
            "license": "MIT",
            "environment": "client",
            "entrypoints": {
              "client": ["net.hungerless.spearlunge.HungerlessSpearClient"]
            },
            "mixins": ["hungerless_spear_lunge.mixins.json"],
            "depends": {
              "fabricloader": ">=0.15.0",
              "minecraft": "~1.21.1",
              "java": ">=17",
              "fabric-api": "*"
            }
          }
          EOF

          cat << 'EOF' > src/main/resources/hungerless_spear_lunge.mixins.json
          {
            "required": true,
            "minVersion": "0.8",
            "package": "net.hungerless.spearlunge.mixin",
            "compatibilityLevel": "JAVA_17",
            "client": [
              "LocalPlayerMixin",
              "ClientPacketListenerMixin"
            ],
            "injectors": {
              "defaultRequire": 1
            }
          }
          EOF

          cat << 'EOF' > src/main/java/net/hungerless/spearlunge/HungerlessSpearClient.java
          package net.hungerless.spearlunge;

          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.fabricmc.fabric.api.client.keybinding.v1.KeyBindingHelper;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.client.option.KeyBinding;
          import net.minecraft.client.util.InputUtil;
          import net.minecraft.text.Text;
          import net.minecraft.util.math.Vec3d;
          import org.lwjgl.glfw.GLFW;
          import org.slf4j.Logger;
          import org.slf4j.LoggerFactory;

          public class HungerlessSpearClient implements ClientModInitializer {
              public static final Logger LOGGER = LoggerFactory.getLogger("hungerless_spear_lunge");
              public static volatile boolean isExploitActive = false;
              public static volatile boolean lungeJustTriggered = false;
              public static Vec3d lungeLookVector = Vec3d.ZERO;
              private static KeyBinding toggleKey;

              @Override
              public void onInitializeClient() {
                  LOGGER.info("Initializing Hungerless Spear Lunge (client-side only)");
                  toggleKey = KeyBindingHelper.registerKeyBinding(new KeyBinding(
                          "key.hungerless_spear_lunge.toggle",
                          InputUtil.Type.KEYSYM,
                          GLFW.GLFW_KEY_H,
                          "key.categories.hungerless_spear"
                  ));
                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (toggleKey.wasPressed()) {
                          isExploitActive = !isExploitActive;
                          if (client.player != null) {
                              if (isExploitActive) {
                                  client.player.sendMessage(
                                          Text.literal("§a[Hungerless Spear] Exploit Engine: ENABLED"),
                                          true
                                  );
                              } else {
                                  client.player.sendMessage(
                                          Text.literal("§c[Hungerless Spear] Exploit Engine: DISABLED"),
                                          true
                                  );
                              }
                          }
                      }
                  });
              }
          }
          EOF

          cat << 'EOF' > src/main/java/net/hungerless/spearlunge/mixin/LocalPlayerMixin.java
          package net.hungerless.spearlunge.mixin;

          import net.hungerless.spearlunge.HungerlessSpearClient;
          import net.minecraft.client.network.ClientPlayerEntity;
          import net.minecraft.enchantment.EnchantmentHelper;
          import net.minecraft.enchantment.Enchantments;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.Items;
          import net.minecraft.util.Hand;
          import net.minecraft.util.math.Vec3d;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.Shadow;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(ClientPlayerEntity.class)
          public abstract class LocalPlayerMixin extends PlayerEntity {

              @Shadow
              public abstract ItemStack getActiveItem();

              @Shadow
              public abstract Hand getActiveHand();

              private LocalPlayerMixin() {
                  super(null, null, 0, null, null);
              }

              @Inject(method = "stopUsingItem", at = @At("HEAD"))
              private void onStopUsingItem(CallbackInfo ci) {
                  if (!HungerlessSpearClient.isExploitActive) {
                      return;
                  }
                  ItemStack stack = this.getActiveItem();
                  if (stack.isEmpty() || !stack.isOf(Items.TRIDENT)) {
                      return;
                  }
                  if (EnchantmentHelper.getLevel(Enchantments.RIPTIDE, stack) <= 0) {
                      return;
                  }
                  if (!this.isTouchingWaterOrRain()) {
                      return;
                  }
                  HungerlessSpearClient.lungeJustTriggered = true;
                  HungerlessSpearClient.lungeLookVector = this.getRotationVector();
              }
          }
          EOF

          cat << 'EOF' > src/main/java/net/hungerless/spearlunge/mixin/ClientPacketListenerMixin.java
          package net.hungerless.spearlunge.mixin;

          import net.hungerless.spearlunge.HungerlessSpearClient;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.client.network.ClientPlayNetworkHandler;
          import net.minecraft.item.Items;
          import net.minecraft.network.packet.Packet;
          import net.minecraft.network.packet.c2s.play.PlayerInteractItemC2SPacket;
          import net.minecraft.util.math.Vec3d;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(ClientPlayNetworkHandler.class)
          public abstract class ClientPacketListenerMixin {

              @Inject(method = "send", at = @At("HEAD"), cancellable = true)
              private void onSendPacket(Packet<?> packet, CallbackInfo ci) {
                  if (!HungerlessSpearClient.isExploitActive) {
                      return;
                  }
                  if (!HungerlessSpearClient.lungeJustTriggered) {
                      return;
                  }
                  if (!(packet instanceof PlayerInteractItemC2SPacket usePacket)) {
                      return;
                  }
                  if (usePacket.getAction() != PlayerInteractItemC2SPacket.Action.STOP) {
                      return;
                  }
                  MinecraftClient client = MinecraftClient.getInstance();
                  if (client.player == null) {
                      return;
                  }
                  if (!client.player.getStackInHand(usePacket.getHand()).isOf(Items.TRIDENT)) {
                      return;
                  }
                  ci.cancel();
                  Vec3d lookVec = HungerlessSpearClient.lungeLookVector;
                  if (lookVec == null) {
                      lookVec = client.player.getRotationVector();
                  }
                  double scaleXZ = 2.5;
                  double scaleY = 0.5;
                  double randomSpread = 0.5;
                  Vec3d push = new Vec3d(
                          lookVec.x * scaleXZ + (client.player.getRandom().nextGaussian() * randomSpread),
                          lookVec.y * scaleY + (client.player.getRandom().nextGaussian() * randomSpread),
                          lookVec.z * scaleXZ + (client.player.getRandom().nextGaussian() * randomSpread)
                  );
                  client.player.addVelocity(push.x, push.y, push.z);
                  client.player.velocityDirty = true;
                  HungerlessSpearClient.lungeJustTriggered = false;
                  HungerlessSpearClient.lungeLookVector = Vec3d.ZERO;
              }
          }
          EOF

      - name: Build the mod
        run: ./gradlew build

      - name: Upload the jar
        uses: actions/upload-artifact@v4
        with:
          name: Hungerless-Spear-Lunge
          path: build/libs/*.jar
